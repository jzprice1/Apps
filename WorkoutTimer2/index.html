<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Workout + Timer</title>
<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  #topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    font-size: 2rem;
    border-bottom: 1px solid #333;
  }

  #topbar button {
    background: none;
    border: none;
    color: white;
    font-size: 2rem;
    cursor: pointer;
  }

  #tracker-screen {
    height: calc(100vh - 70px);
    overflow-y: auto;
    padding: 20px;
  }

  #sticky-timer {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-bottom: 1px solid #333;
  }

  #timer-container {
    text-align: center;
    padding: 12px 0;
  }

  #timer {
    font-size: 4rem;
  }

  #timer-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 6px 12px 10px;
  }

  #timer-buttons button {
    flex: 1;
    padding: 10px;
    font-size: 1.1rem;
    background: #222;
    color: white;
    border: 1px solid #444;
    border-radius: 8px;
  }

  #timer-buttons button:active {
    background: #333;
  }

  #tracker-screen h2 {
    text-align: center;
    font-size: 2rem;
    font-weight: 600;
    margin-top: 20px;
  }

  .exercise-row {
    margin-bottom: 20px;
  }

  .exercise-select {
    width: 100%;
    padding: 10px;
    font-size: 1.1rem;
    background: #222;
    color: #eee;
    border: 1px solid #444;
    border-radius: 6px;
    margin: 0 0 4px 0;
  }

  .exercise-select option {
    background: #222;
    color: #eee;
  }

  .sets-label {
    margin-top: 8px;
    font-size: 1rem;
    opacity: 0.8;
  }

  .checkboxes {
    display: flex;
    gap: 12px;
    margin-top: 10px;
  }

  input[type="checkbox"] {
    width: 22px;
    height: 22px;
  }

  button.action {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    font-size: 1.2rem;
    background: #333;
    color: #eee;
    border: 1px solid #555;
    border-radius: 6px;
  }

  #summary {
    white-space: pre-wrap;
    margin-top: 10px;
    padding: 12px;
    border: 1px solid #444;
    background: #1a1a1a;
    font-family: monospace;
    border-radius: 6px;
  }

  /* HISTORY SCREEN */
  #history-screen {
    display: none;
    height: calc(100vh - 70px);
    overflow-y: auto;
    padding: 20px;
  }

  .history-entry {
    border: 1px solid #444;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 16px;
    background: #1a1a1a;
  }

  .history-entry h3 {
    margin: 0 0 8px 0;
    font-size: 1.2rem;
  }

  #history-summary {
    margin-top: 20px;
    padding: 12px;
    background: #111;
    border: 1px solid #444;
    border-radius: 6px;
    white-space: pre-wrap;
    font-family: monospace;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #0f0;
    color: #000;
    padding: 10px 20px;
    border-radius: 6px;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  #toast.show {
    opacity: 1;
  }

  /* CSV EDITOR */
  #csv-editor {
    display: none;
    margin-top: 20px;
    padding: 12px;
    border: 1px solid #444;
    border-radius: 6px;
    background: #111;
  }

  #csv-editor textarea {
    width: 100%;
    min-height: 180px;
    background: #000;
    color: #eee;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 10px;
    font-family: monospace;
    font-size: 0.95rem;
    box-sizing: border-box;
  }

  #csv-editor .row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  #csv-editor .row button {
    flex: 1;
    padding: 10px;
    font-size: 1rem;
    background: #222;
    color: #fff;
    border: 1px solid #444;
    border-radius: 6px;
  }
</style>
</head>
<body>

<div id="topbar">
  <button id="open-history">📅</button>
  <span id="clock-text"></span>
  <button id="open-tracker">⏱️</button>
</div>

<div id="tracker-screen">

  <div id="sticky-timer">
    <div id="timer-container">
      <div id="timer">2:00</div>
    </div>

    <div id="timer-buttons">
      <button id="reset">Reset Timer</button>
      <button id="edit-timer">✏️ Edit</button>
    </div>
  </div>

  <h2>Workout Tracker</h2>
  <div id="exerciseContainer"></div>

  <button id="doneBtn" class="action">Done</button>
  <button id="copyBtn" class="action">Copy Summary</button>
  <button id="toggleCsvEditor" class="action">Edit CSV</button>

  <div id="csv-editor">
    <textarea id="csvText"></textarea>
    <div class="row">
      <button id="reloadCsvBtn">Reload CSV</button>
      <button id="saveCsvBtn">Save CSV</button>
    </div>
  </div>

  <div id="summary"></div>
</div>

<div id="history-screen">
  <div id="history-list"></div>
  <button id="history-summary-btn" class="action">Summary</button>
  <button id="history-copy-btn" class="action">Copy Summary</button>
  <div id="history-summary"></div>
</div>

<div id="toast">Copied!</div>

<script>
/* --- CLOCK --- */
const clock = document.getElementById("clock-text");
function updateClock() {
  clock.textContent = new Date().toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}
updateClock();
setInterval(updateClock, 1000);

/* --- TIMER --- */
let TIMER_DURATION = 120000;
const STORAGE_KEY = "accurate_timer_start";
const LENGTH_KEY = "timer_length_minutes";

const timerDisplay = document.getElementById("timer");
const resetButton = document.getElementById("reset");
const editButton = document.getElementById("edit-timer");

let interval;

function getRemainingTime() {
  const startTime = parseInt(localStorage.getItem(STORAGE_KEY), 10);
  if (!startTime) return 0;
  const elapsed = Date.now() - startTime;
  return Math.max(0, TIMER_DURATION - elapsed);
}

function renderTimer() {
  const remainingMs = getRemainingTime();
  const totalSeconds = Math.ceil(remainingMs / 1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  timerDisplay.textContent =
    minutes + ":" + String(seconds).padStart(2, "0");

  if (remainingMs <= 0) {
    clearInterval(interval);
    timerDisplay.textContent = "0:00";
  }
}

function startTimer() {
  clearInterval(interval);
  localStorage.setItem(STORAGE_KEY, Date.now());
  renderTimer();
  interval = setInterval(renderTimer, 1000);
}

resetButton.addEventListener("click", startTimer);

editButton.addEventListener("click", () => {
  const newMinutes = parseFloat(prompt("Enter new timer length (minutes):"));
  if (!isNaN(newMinutes) && newMinutes > 0) {
    TIMER_DURATION = newMinutes * 60000;
    localStorage.setItem(LENGTH_KEY, newMinutes);
    startTimer();
  }
});

const savedLength = parseFloat(localStorage.getItem(LENGTH_KEY));
if (!isNaN(savedLength) && savedLength > 0) {
  TIMER_DURATION = savedLength * 60000;
}

if (!localStorage.getItem(STORAGE_KEY)) {
  startTimer();
} else {
  renderTimer();
  interval = setInterval(renderTimer, 1000);
}

/* --- CSV LOADING (no sort!) --- */
const container = document.getElementById("exerciseContainer");
const CSV_URL = "exercises.csv";
const CSV_KEY = "exercises_csv_text";

// Parse CSV, keep order, no sort
function parseCSV(text) {
  const lines = text.replace(/\r/g, "").split("\n").filter(l => l.trim() !== "");
  if (lines.length === 0) return [];

  const headers = lines[0].split(",").map(s => s.trim());
  const nameIdx = Math.max(headers.indexOf("name"), 0);

  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");
    const name = (cols[nameIdx] || "").trim();
    if (name) out.push(name);
  }
  return out;
}

async function loadCsvText() {
  const local = localStorage.getItem(CSV_KEY);
  if (local) return local;

  const res = await fetch(CSV_URL, { cache: "no-store" });
  if (!res.ok) throw new Error("CSV load failed");
  return await res.text();
}

async function getPastExerciseNames() {
  try {
    const text = await loadCsvText();
    const raw = parseCSV(text);
    return Array.from(new Set(raw)); // removes duplicates, keeps CSV order
  } catch (e) {
    console.warn(e);
    return [];
  }
}

/* --- WORKOUT ROWS (CSV‑only) --- */
function createCheckboxRow() {
  const wrapper = document.createElement("div");
  wrapper.className = "checkboxes";

  const first = document.createElement("input");
  first.type = "checkbox";
  wrapper.appendChild(first);

  wrapper.addEventListener("change", () => {
    const boxes = wrapper.querySelectorAll("input[type='checkbox']");
    if (boxes[boxes.length - 1].checked) {
      const newBox = document.createElement("input");
      newBox.type = "checkbox";
      wrapper.appendChild(newBox);
    }
  });

  return wrapper;
}

function createExerciseRow() {
  const row = document.createElement("div");
  row.className = "exercise-row";

  const select = document.createElement("select");
  select.className = "exercise-select";

  const placeholder = document.createElement("option");
  placeholder.value = "";
  placeholder.textContent = "Select exercise...";
  placeholder.disabled = true;
  placeholder.selected = true;
  select.appendChild(placeholder);

  // --- Populate options from CSV here instead of only in rebuildExerciseUI ---
  (async () => {
    const usedNames = await getPastExerciseNames();
    usedNames.forEach(name => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      select.appendChild(opt);
    });
  })();

  const setsLabel = document.createElement("div");
  setsLabel.className = "sets-label";
  setsLabel.textContent = "Sets:";

  const checkboxWrapper = createCheckboxRow();

  row.appendChild(select);
  row.appendChild(setsLabel);
  row.appendChild(checkboxWrapper);
  container.appendChild(row);

  // Attach behavior so picking an exercise creates the next row
  select.addEventListener("change", () => {
    const value = select.value;
    const rows = document.querySelectorAll(".exercise-row");
    const lastRow = rows[rows.length - 1];

    if (value !== "" && row === lastRow) {
      createExerciseRow();
    }
  });

  return row;
}



async function rebuildExerciseUI() {
  container.innerHTML = "";
  const row = createExerciseRow();
}




rebuildExerciseUI();

/* --- GET NAME FROM ROW --- */
function getRowName(row) {
  const select = row.querySelector("select");
  if (select && select.value) {
    return select.value === "" ? "" : select.value.trim();
  }
  return "";
}

/* --- SAVE WORKOUT HISTORY --- */
document.getElementById("doneBtn").addEventListener("click", () => {
  const rows = document.querySelectorAll(".exercise-row");
  const workout = {
    timestamp: Date.now(),
    exercises: []
  };

  rows.forEach(row => {
    const name = getRowName(row);
    if (!name) return;

    const checkboxes = row.querySelectorAll("input[type='checkbox']");
    let count = 0;
    checkboxes.forEach(cb => {
      if (cb.checked) count++;
    });

    workout.exercises.push({ name, sets: count });
  });

  const summaryDiv = document.getElementById("summary");
  summaryDiv.innerHTML = "";

  workout.exercises.forEach((ex, idx) => {
    const wrapper = document.createElement("div");
    wrapper.style.marginBottom = "8px";

    const text = document.createElement("span");
    text.textContent = `Exercise: ${ex.name} — ${ex.sets} sets`;

    const delBtn = document.createElement("button");
    delBtn.textContent = "🗑️";
    delBtn.style.marginLeft = "8px";
    delBtn.style.fontSize = "0.9rem";
    delBtn.style.background = "#444";
    delBtn.style.color = "white";
    delBtn.style.border = "1px solid #666";
    delBtn.style.borderRadius = "4px";
    delBtn.style.padding = "2px 6px";

    delBtn.addEventListener("click", () => {
      workout.exercises.splice(idx, 1);

      const history = JSON.parse(localStorage.getItem("workout_history") || "[]");
      const current = history.find(h => h.timestamp === workout.timestamp);
      if (current) {
        current.exercises = workout.exercises;
        localStorage.setItem("workout_history", JSON.stringify(history));
      }

      renderWorkoutSummary(workout);
    });

    wrapper.appendChild(text);
    wrapper.appendChild(delBtn);
    summaryDiv.appendChild(wrapper);
  });

  function renderWorkoutSummary(workout) {
    const summaryDiv = document.getElementById("summary");
    summaryDiv.innerHTML = "";

    workout.exercises.forEach((ex, idx) => {
      const wrapper = document.createElement("div");
      wrapper.style.marginBottom = "8px";

      const text = document.createElement("span");
      text.textContent = `Exercise: ${ex.name} — ${ex.sets} sets`;

      const delBtn = document.createElement("button");
      delBtn.textContent = "🗑️";
      delBtn.style.marginLeft = "8px";
      delBtn.style.fontSize = "0.9rem";
      delBtn.style.background = "#444";
      delBtn.style.color = "white";
      delBtn.style.border = "1px solid #666";
      delBtn.style.borderRadius = "4px";
      delBtn.style.padding = "2px 6px";

      delBtn.addEventListener("click", () => {
        workout.exercises.splice(idx, 1);

        const history = JSON.parse(localStorage.getItem("workout_history") || "[]");
        const current = history.find(h => h.timestamp === workout.timestamp);
        if (current) {
          current.exercises = workout.exercises;
          localStorage.setItem("workout_history", JSON.stringify(history));
        }

        renderWorkoutSummary(workout);
      });

      wrapper.appendChild(text);
      wrapper.appendChild(delBtn);
      summaryDiv.appendChild(wrapper);
    });
  }

  let history = JSON.parse(localStorage.getItem("workout_history") || "[]");
  history.push(workout);
  localStorage.setItem("workout_history", JSON.stringify(history));
});

/* --- COPY POPUP --- */
document.getElementById("copyBtn").addEventListener("click", () => {
  const text = Array.from(document.getElementById("summary").children)
    .map(child => child.querySelector("span")?.textContent || "")
    .join("\n");

  navigator.clipboard.writeText(text);

  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1000);
});

/* --- NAVIGATION --- */
const trackerScreen = document.getElementById("tracker-screen");
const historyScreen = document.getElementById("history-screen");
const historyList = document.getElementById("history-list");

document.getElementById("open-history").addEventListener("click", () => {
  trackerScreen.style.display = "none";
  historyScreen.style.display = "block";
  loadHistory();
});

document.getElementById('open-tracker').addEventListener('click', ()=>{ historyScreen.style.display='none'; trackerScreen.style.display='block'; });
function loadHistory(){ const history=JSON.parse(localStorage.getItem('workout_history')||'[]'); historyList.innerHTML=''; history.forEach((entry, idx)=>{ const div=document.createElement('div'); div.className='history-entry'; const date=new Date(entry.timestamp).toLocaleString(); let html=`<h3>${date}</h3>`; entry.exercises.forEach(ex=>{ html += `<div>${ex.name} — ${ex.sets} sets</div>`; }); div.innerHTML=html; const delBtn=document.createElement('button'); delBtn.textContent='🗑️ Delete workout'; delBtn.style.marginTop='8px'; delBtn.style.background='#444'; delBtn.style.color='white'; delBtn.style.border='1px solid #666'; delBtn.style.borderRadius='6px'; delBtn.style.padding='4px 8px'; delBtn.addEventListener('click', ()=>{ history.splice(idx,1); localStorage.setItem('workout_history', JSON.stringify(history)); loadHistory(); }); div.appendChild(delBtn); historyList.appendChild(div); }); }
document.getElementById('history-summary-btn').addEventListener('click', ()=>{ const history=JSON.parse(localStorage.getItem('workout_history')||'[]'); const totals={}; history.forEach(workout=>{ workout.exercises.forEach(ex=>{ const name=ex.name.trim(); if(!totals[name]) totals[name]=0; totals[name]+=ex.sets; }); }); document.getElementById('history-summary').textContent=Object.keys(totals).map(name=>`${name} — ${totals[name]} sets`).join('\n').trim(); });
const csvEditor=document.getElementById('csv-editor'); const csvText=document.getElementById('csvText'); const toggleCsvEditor=document.getElementById('toggleCsvEditor'); const saveCsvBtn=document.getElementById('saveCsvBtn'); const reloadCsvBtn=document.getElementById('reloadCsvBtn');
toggleCsvEditor.addEventListener('click', async ()=>{ csvEditor.style.display = csvEditor.style.display === 'none' ? 'block' : 'none'; if(csvEditor.style.display === 'block'){ csvText.value = localStorage.getItem(CSV_KEY) || await (await fetch(CSV_URL,{cache:'no-store'})).text(); } });
saveCsvBtn.addEventListener('click', async ()=>{ localStorage.setItem(CSV_KEY, csvText.value); await rebuildExerciseUI(); });
reloadCsvBtn.addEventListener('click', async ()=>{ localStorage.removeItem(CSV_KEY); csvText.value = await (await fetch(CSV_URL,{cache:'no-store'})).text(); await rebuildExerciseUI(); });
</script>
</body>
</html>
