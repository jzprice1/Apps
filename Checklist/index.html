<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Checklist</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #ffffff;
            color: #000000;
        }
        .container {
            background: #ffffff;
            border-radius: 4px;
            padding: 20px;
            border: 1px solid #000000;
        }
        h1 {
            text-align: center;
            color: #000000;
            margin-bottom: 20px;
            font-size: 1.6em;
        }
        .task-input {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        input[type="text"] {
            flex: 1;
            padding: 8px;
            border: 1px solid #000000;
            border-radius: 2px;
            font-size: 14px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #000000;
        }
        button {
            padding: 8px 14px;
            border: 1px solid #000000;
            border-radius: 2px;
            font-size: 14px;
            cursor: pointer;
            background: #ffffff;
            color: #000000;
        }
        button:hover {
            background: #000000;
            color: #ffffff;
        }
        .reset-btn {
            width: 100%;
            margin-top: 16px;
        }
        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 8px;
            margin-bottom: 6px;
            border: 1px solid #000000;
            border-radius: 2px;
        }
        .task-item.completed {
            opacity: 0.7;
        }
        .task-checkbox {
            width: 16px;
            height: 16px;
            margin-right: 10px;
        }
        .task-text {
            flex: 1;
            font-size: 14px;
        }
        .task-text.completed {
            text-decoration: line-through;
        }
        .delete-btn {
            width: 24px;
            height: 24px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .stats {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daily Checklist</h1>
        
        <div class="task-input">
            <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="100">
            <button onclick="addTask()">Add</button>
        </div>

        <ul class="task-list" id="taskList"></ul>
        
        <div class="stats">
            <span id="completedCount">0</span> / <span id="totalCount">0</span> completed
        </div>
        
        <button class="reset-btn" onclick="resetDaily()">Reset for New Day</button>
    </div>

    <script>
        const TASKS_KEY = 'dailyChecklistTasks';
        const LAST_CHECK_TIME_KEY = 'dailyChecklistLastCheckTime';

        let tasks = [];

        function getMidnightTimestamp() {
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            return now.getTime();
        }

        function loadData() {
            const savedTasks = localStorage.getItem(TASKS_KEY);
            const lastCheckTime = localStorage.getItem(LAST_CHECK_TIME_KEY);
            const midnightToday = getMidnightTimestamp();
            
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
            }
            
            if (lastCheckTime && parseInt(lastCheckTime, 10) < midnightToday) {
                resetCheckboxes();
            }
            
            renderTasks();
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            
            if (text) {
                tasks.push({ text, completed: false });
                saveData();
                input.value = '';
                renderTasks();
            }
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveData();
            renderTasks();
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;

            if (tasks[index].completed) {
                localStorage.setItem(LAST_CHECK_TIME_KEY, Date.now().toString());
            }

            saveData();
            renderTasks();
        }

        function resetCheckboxes() {
            tasks.forEach(task => task.completed = false);
            saveData();
        }

        function resetDaily() {
            const midnightToday = getMidnightTimestamp();
            const lastCheckTime = localStorage.getItem(LAST_CHECK_TIME_KEY);

            if (!lastCheckTime || parseInt(lastCheckTime, 10) < midnightToday) {
                resetCheckboxes();
                renderTasks();
            } else {
                alert('No reset needed – tasks were already checked today.');
            }
        }

        function saveData() {
            localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
        }

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            const totalCount = tasks.length;
            const completedCount = tasks.filter(t => t.completed).length;
            
            taskList.innerHTML = tasks.map((task, index) => `
                <li class="task-item ${task.completed ? 'completed' : ''}">
                    <input type="checkbox" class="task-checkbox" 
                           ${task.completed ? 'checked' : ''} 
                           onchange="toggleTask(${index})">
                    <span class="task-text ${task.completed ? 'completed' : ''}">${task.text}</span>
                    <button class="delete-btn" onclick="deleteTask(${index})" title="Delete task">×</button>
                </li>
            `).join('');
            
            document.getElementById('completedCount').textContent = completedCount;
            document.getElementById('totalCount').textContent = totalCount;
        }

        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        loadData();
    </script>
</body>
</html>
